# ──────────────────────────────────────────────────────────────
# vinhlong360 — Continuous Integration
#
# Runs on every push to main and on pull requests.
# Jobs: lint, test, docker build verification, secret scanning.
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # Check for style violations (non-zero exit = failure)
      - name: Run ruff check
        run: ruff check agent/ scripts/ tests/ --output-format=github

      # Verify import sorting
      - name: Run ruff format check
        run: ruff format --check agent/ scripts/ tests/

  # ── 2. Test ────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip packages between runs to speed up installs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          # Dummy values so modules that read env vars at import time
          # don't crash.  No real API calls are made during tests.
          LLM_API_KEY: "test-ci-key"
          LLM_BASE_URL: "http://localhost:9999/v1"
          LLM_MODEL: "test-model"
          LLM_MODEL_MINI: "test-model-mini"
          ADMIN_API_KEY: "test-admin-key"
          CORS_ORIGINS: "http://localhost:8360"
          DESTRUCTIVE_OPS_LOCKED: "1"
        run: |
          # Chạy CẢ tests/ và agent/tests/; bao gồm integration (chỉ loại 'slow').
          pytest tests/ agent/tests/ \
            -m "not slow" \
            -v \
            --tb=short \
            --cov=agent \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Validate data.json
        run: python scripts/validate_data.py

      # Upload the coverage report as a build artifact
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── 2b. Test on Postgres (UGC/auth prod-parity) ─────────────
  # Job RIÊNG: chạy suite với DATABASE_URL=postgres → bật các test UGC/auth
  # đang skip trên SQLite (Postgres-only). Job `test` ở trên vẫn chạy SQLite
  # (nhanh, ổn định). Prod dùng Postgres cho CẢ entity lẫn UGC → đây là parity thật.
  test-pg:
    name: Test (Postgres — UGC/auth)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vl360
          POSTGRES_PASSWORD: vl360
          POSTGRES_DB: vinhlong360
        ports:
          - 5432:5432
        # Chờ Postgres sẵn sàng trước khi bước test chạy
        options: >-
          --health-cmd "pg_isready -U vl360 -d vinhlong360"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://vl360:vl360@localhost:5432/vinhlong360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      # init.sql (baseline) + agent/migrations/*.sql lên Postgres CI trống.
      - name: Apply schema + migrations
        run: python scripts/apply_migrations.py --init-baseline

      - name: Run tests against Postgres (prod-parity)
        env:
          # Dummy để module đọc env lúc import không crash (không gọi API thật).
          LLM_API_KEY: "test-ci-key"
          LLM_BASE_URL: "http://localhost:9999/v1"
          LLM_MODEL: "test-model"
          LLM_MODEL_MINI: "test-model-mini"
          ADMIN_API_KEY: "test-admin-key"
          CORS_ORIGINS: "http://localhost:8360"
          DESTRUCTIVE_OPS_LOCKED: "1"
        run: |
          # DATABASE_URL=postgres → db._use_pg=True → các test @pg_only chạy (không skip).
          pytest tests/ agent/tests/ \
            -m "not slow" \
            --tb=short

  # ── 3. Data coverage (informational, non-blocking) ──────────
  # Prints the % of entities (overall + per type) carrying real photos,
  # summaries, external sources, coordinates, placeId and area. This step
  # never fails the build — coverage_report.py always exits 0, and the job
  # is marked continue-on-error so a transient hiccup cannot gate CI.
  coverage:
    name: Data coverage report
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # coverage_report.py is pure stdlib — no pip install required.
      - name: Generate coverage report
        run: |
          python scripts/coverage_report.py --json > coverage-metrics.json
          python scripts/coverage_report.py

      - name: Upload coverage metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-coverage-report
          path: coverage-metrics.json
          retention-days: 30

  # ── 4. Frontend ─────────────────────────────────────────────
  frontend:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-nuxt
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-nuxt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # ── 5. Docker build (agent) ──────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Buildx gives us layer caching and multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build only -- do NOT push.  This verifies the Dockerfile
      # produces a valid image without publishing anything.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vinhlong360-agent:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6. Security — secret scanning ─────────────────────────
  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for diff-based scanning

      # TruffleHog scans the entire git history for leaked secrets
      # (API keys, tokens, passwords).  Fails the build if any are found.
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ── 7. Frontend typecheck (informational, non-blocking) ─────
  # Runs `nuxt typecheck` (vue-tsc). NON-BLOCKING for now: the app carries a
  # backlog of pre-existing type errors (untyped useFetch/$fetch data). The job
  # surfaces the count so it can be driven down incrementally; flip
  # continue-on-error to false once it reaches 0 to make it a real gate.
  # Value today: catches the "missing composable / undefined → SSR 500" class
  # (e.g. the /danh-ba, /theo-mua regression) that `npm run build` did not.
  typecheck:
    name: Frontend typecheck (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: web-nuxt
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-nuxt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run nuxt typecheck
        run: npm run typecheck

  # ── 8. Infrastructure validation ────────────────────────────
  infra:
    name: Infrastructure checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        run: docker compose config -q

      - name: Validate docker-compose.prod.yml syntax
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q

      - name: Check for hardcoded secrets in scripts (informational)
        continue-on-error: true
        run: |
          echo "::notice::Scanning scripts/ for potential hardcoded secrets..."
          grep -rn "password\|secret\|api_key" scripts/ --include="*.py" -i || echo "No matches found."

  # ── 9. Lighthouse CI (placeholder) ─────────────────────────
  # TODO: Enable when a staging URL is available.
  # Lighthouse needs a running server to audit; until CI can spin up
  # the full stack (or we point at a staging URL), this is a placeholder.
  #
  # lighthouse:
  #   name: Lighthouse audit
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #   needs: [frontend]
  #   continue-on-error: true
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: treosh/lighthouse-ci-action@v12
  #       with:
  #         urls: https://vinhlong360.vn
  #         uploadArtifacts: true

  # ── 10. Dependency CVE scan (informational, non-blocking) ───
  # Scans Python (pip-audit) and Node (npm audit) deps for known CVEs.
  # NON-BLOCKING: upstream advisories can land on unrelated PRs, so this
  # reports rather than gates. Complements the verified-secret scan above.
  deps-audit:
    name: Dependency CVE scan (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit (Python deps)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --progress-spinner off

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-nuxt/package-lock.json

      - name: npm audit (Node deps, high+)
        working-directory: web-nuxt
        run: npm audit --audit-level=high
