# ──────────────────────────────────────────────────────────────
# vinhlong360 — Release & Deploy
#
# Triggered when a version tag (v*) is pushed, e.g.:
#   git tag v1.2.0 && git push origin v1.2.0
#
# Jobs:
#   1. Build and push a Docker image to GitHub Container Registry
#   2. Create a GitHub Release with auto-generated changelog
# ──────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target (for future use — currently only builds + publishes image)"
        required: true
        default: "docker-only"
        type: choice
        options:
          - docker-only
      dry_run:
        description: "Dry run (build but do not push)"
        required: false
        default: false
        type: boolean

# Permissions required for GHCR push and release creation
permissions:
  contents: write        # create GitHub Releases
  packages: write        # push to ghcr.io
  id-token: write        # OIDC for signing (optional, future-proofing)

jobs:
  # ── 1. Build & push Docker image to GHCR ──────────────────
  docker-publish:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Extract version from the git tag (e.g. v1.2.0 -> 1.2.0)
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry using the built-in
      # GITHUB_TOKEN (no extra secrets required)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate OCI-compliant image labels (version, commit, date, etc.)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Embed build info as labels for traceability
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_SHA=${{ github.sha }}

  # ── 2. Pre-deploy checks ────────────────────────────────────
  pre-deploy-checks:
    name: Pre-deploy verification
    runs-on: ubuntu-latest
    needs: docker-publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify data backup exists (informational)
        continue-on-error: true
        run: |
          echo "::notice::Checking for recent backups..."
          if [ -f scripts/backup_data.py ]; then
            python scripts/backup_data.py
            echo "Backup created/verified successfully."
          else
            echo "::warning::scripts/backup_data.py not found — skipping backup check."
          fi

      - name: Run health check script (informational)
        continue-on-error: true
        run: |
          if [ -f scripts/health_check.py ]; then
            echo "::notice::Running health_check.py against production..."
            python scripts/health_check.py --url https://vinhlong360.vn || \
              echo "::warning::Health check failed or server unreachable (may be expected for first deploy)."
          else
            echo "::notice::scripts/health_check.py not found — skipping health check."
          fi

  # ── 3. Create GitHub Release ───────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-publish, pre-deploy-checks]
    if: github.event_name == 'push'   # release only on tag push, not manual dispatch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      # Generate a changelog from conventional commits since the
      # previous tag.  Falls back to a commit-list diff if there
      # is no prior tag.
      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag (if any)
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $GITHUB_REF_NAME"
            CHANGES=$(git log "$PREV_TAG".."$GITHUB_REF_NAME" \
              --pretty=format:"- %s (%h)" \
              --no-merges)
          else
            echo "No previous tag found — using full log"
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -30)
          fi

          # Write multi-line output safely
          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            echo "$CHANGES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ## Quick Start

            ```bash
            # Copy and configure environment
            cp .env.example .env
            # Edit .env with your API keys

            # Run with Docker Compose
            docker compose up -d
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Deploy notification ──────────────────────────────────
  notify:
    name: Deploy status notification
    runs-on: ubuntu-latest
    needs: [docker-publish, pre-deploy-checks, release]
    if: always()
    steps:
      - name: Report deploy status
        run: |
          echo "============================================"
          echo "  DEPLOY STATUS: ${{ github.ref_name }}"
          echo "============================================"
          echo "  Docker publish: ${{ needs.docker-publish.result }}"
          echo "  Pre-deploy checks: ${{ needs.pre-deploy-checks.result }}"
          echo "  Release: ${{ needs.release.result }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================"

          if [ "${{ needs.docker-publish.result }}" = "failure" ]; then
            echo "::error::Docker image build/push FAILED. Deploy did not proceed."
            exit 1
          fi

          if [ "${{ needs.release.result }}" = "failure" ]; then
            echo "::warning::GitHub Release creation failed, but Docker image was pushed successfully."
          fi

          echo "Deploy pipeline completed."
