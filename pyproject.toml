# Ruff config — SP3 Backend (chương trình chuẩn-hoá R20.1).
# Bật pyflakes (F) + pycodestyle E/W cho lỗi CORRECTNESS thật (unused-import,
# undefined-name, unused-var...). BỎ các mã là STYLE CỐ Ý của repo:
#   E402 lazy-import sau sys.path hack · E701/E702 `;`-chain & inline `if:`
#   (khớp CLAUDE.md §6) · E501 dòng dài (repo có dòng tới 451 ký tự có chủ đích).
# Chưa bật I (isort) để tránh xáo trộn thứ tự import quanh lazy-import; ratchet
# riêng sau. web-nuxt là JS/Nuxt — ngoài phạm vi.
[tool.ruff]
target-version = "py310"
exclude = ["web-nuxt", ".nuxt", ".output", "node_modules", ".venv", "venv", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E402", "E701", "E702", "E501", "E741"]
